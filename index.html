<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bro-педия — Википедия по понятиям</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
</head>
<body>
    <div class="container">
        <!-- Название -->
        <h1 class="logo">Bro-педия</h1>
        
        <!-- Слоган -->
        <p class="subtitle">Спроси — получишь ответ по-братски</p>
        
        <!-- 4 кнопки (примеры вопросов) -->
        <div class="sample-buttons">
            <button class="sample-btn" data-question="Кто такой Ип Ман?">🥋 Ип Ман</button>
            <button class="sample-btn" data-question="Что за Чебурашка?">🐻 Чебурашка</button>
            <button class="sample-btn" data-question="Расскажи про Москву">🤖 Москва</button>
            <button class="sample-btn" data-question="Кто такой Петросян?">✍️ Петросян</button>
        </div>
        
        <!-- Окно для вопроса -->
        <div class="search-box">
            <input type="text" id="questionInput" placeholder="Напиши свой вопрос..." autocomplete="off">
        </div>
        
        <!-- Кнопка Спросить -->
        <button id="askButton" class="ask-button">Спросить</button>
        
        <!-- Окно для ответа -->
        <div id="answerContainer" class="answer-container"></div>
    </div>
    
    <div id="adminIcon" style="display: none;">🔧</div>
    <div id="adminModal" style="display: none;"></div>
    <div id="adminPanel" style="display: none;"></div>
    
    <script src="script.js"></script>
</body>
</html>
