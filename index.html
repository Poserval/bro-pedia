<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bro-педия — Википедия по понятиям</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#1a73e8">
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Иконки -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-app-192.png">
</head>
<body>
    <div class="container">
        <h1 class="logo">Bro-педия</h1>
        <p class="subtitle">Спроси — получишь ответ по понятиям</p>
        
        <div class="search-box">
            <input type="text" id="questionInput" placeholder="Например: Кто такой Чебурашка?" autocomplete="off">
            <button id="askButton">Спросить</button>
        </div>
        
        <div id="answerContainer" class="answer-container"></div>
    </div>
    
    <!-- Админ-панель (только для браузера, не для APK) -->
    <div id="adminIcon" style="display: none; position: fixed; top: 15px; right: 15px; cursor: pointer; background: #1a73e8; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 999;">
        🔧
    </div>
    
    <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 30px; max-width: 300px; text-align: center;">
            <h3 style="margin-bottom: 20px;">🔐 Вход в админку</h3>
            <input type="password" id="adminPassword" placeholder="Пароль" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;">
            <button id="adminLoginBtn" style="background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer;">Войти</button>
            <button id="adminCloseBtn" style="background: #ccc; color: black; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; margin-left: 10px;">Закрыть</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
